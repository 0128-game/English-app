<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Supabase単語アプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 10px; background: #3ecf8e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #36b87d; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
        .quiz-q { font-size: 1.5rem; text-align: center; margin: 20px 0; font-weight: bold; }
        #feedback { text-align: center; height: 20px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. 接続設定</h2>
        <input type="text" id="tableName" placeholder="テーブル名を入力 (例: my_words)">
        <button onclick="loadData()">データを取得する</button>
    </div>

    <div id="listCard" class="card" style="display:none;">
        <h2>2. 単語一覧</h2>
        <table>
            <thead><tr><th>英</th><th>日</th></tr></thead>
            <tbody id="wordList"></tbody>
        </table>
        <br>
        <button onclick="startQuiz()" style="background:#444;">クイズを開始</button>
    </div>

    <div id="quizCard" class="card" style="display:none;">
        <h2>3. クイズ</h2>
        <div id="qJapanese" class="quiz-q"></div>
        <input type="text" id="userAnswer" placeholder="英語で答えを入力">
        <button onclick="checkAnswer()">回答する</button>
        <div id="feedback"></div>
    </div>

    <script>
        // ★ここを書き換えてください★
        const SUPABASE_URL = 'https://vcbhwpahrzdjbakflwvd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjYmh3cGFocnpkamJha2Zsd3ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTEzMzEsImV4cCI6MjA5MjUyNzMzMX0.Uv71jxtuVhoofw7Z5daMB7JhGncUNQyRslTuGhl_KI0';

        let supabaseClient;
        let words = [];
        let currentWord = null;

        // 初期化：ライブラリが読み込まれてからクライアントを作成
        window.onload = () => {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            } else {
                alert("Supabaseライブラリの読み込みに失敗しました。ネット接続を確認してください。");
            }
        };

        async function loadData() {
            const tableName = document.getElementById('tableName').value.trim();
            if (!tableName) return alert("テーブル名を入力してください");

            try {
                const { data, error } = await supabaseClient.from(tableName).select('*');
                if (error) throw error;
                
                words = data;
                renderTable();
                document.getElementById('listCard').style.display = 'block';
            } catch (err) {
                alert("エラー: " + err.message + "\n※テーブル名が正しいか、RLS設定が『公開』になっているか確認してください。");
            }
        }

        function renderTable() {
            const list = document.getElementById('wordList');
            list.innerHTML = words.map(w => `<tr><td>${w.english}</td><td>${w.japanese}</td></tr>`).join('');
        }

        function startQuiz() {
            document.getElementById('quizCard').style.display = 'block';
            nextQuestion();
        }

        function nextQuestion() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            document.getElementById('qJapanese').innerText = currentWord.japanese;
            document.getElementById('userAnswer').value = '';
            document.getElementById('feedback').innerText = '';
        }

        function checkAnswer() {
            const ans = document.getElementById('userAnswer').value.trim();
            const fb = document.getElementById('feedback');
            if (ans === currentWord.english) {
                fb.innerHTML = "<b style='color:green'>正解！</b>";
                setTimeout(nextQuestion, 1000);
            } else {
                fb.innerHTML = `<b style='color:red'>残念！ 答: ${currentWord.english}</b>`;
            }
        }
    </script>
</body>
</html>
